<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Exclusiva • Restaurante X</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0B0F17;
            color: #F8FAFC;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            overflow-x: hidden;
        }

        /* Efeito de luz ambiente de alto padrão */
        body::before {
            content: '';
            position: absolute;
            top: -15%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.07) 0%, rgba(11, 15, 23, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Tela Inicial - Máquina de Escrever (Intro Cinematográfica) */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #07090E;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #intro-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .typewriter-container {
            max-width: 600px;
            text-align: center;
        }

        .typewriter-text {
            font-family: 'Courier Prime', monospace;
            font-size: 1.5rem;
            color: #F3E5AB;
            line-height: 1.6;
            letter-spacing: 1px;
            border-right: 2px solid #D4AF37;
            white-space: pre-wrap;
            display: inline-block;
        }

        .intro-hint {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse-hint 2s infinite;
        }

        @keyframes pulse-hint {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Container Principal da Carta de Reserva (Oculto inicialmente) */
        .page-container {
            width: 100%;
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
        }

        .page-container.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Cartão Glassmorphism estilo Hotel 6 Estrelas / Copacabana Palace */
        .glass-container {
            width: 100%;
            max-width: 500px;
            background: rgba(18, 24, 38, 0.92);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.35);
            border-radius: 32px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.75), 0 0 30px rgba(212, 175, 55, 0.08);
            overflow: hidden;
        }

        .hero-banner {
            width: 100%;
            height: 220px;
            background: linear-gradient(180deg, rgba(11,15,23,0.1) 0%, rgba(18,24,38,0.98) 100%), 
                        url('https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=1000&q=80') center/cover no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 24px 28px;
            color: #FFFFFF;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .concierge-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.5);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #F3E5AB;
        }

        .restaurant-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.1rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
            color: #FFFFFF;
        }

        .restaurant-subtitle {
            font-size: 0.82rem;
            color: #D4AF37;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        .form-content {
            padding: 32px 28px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #CBD5E1;
            margin-bottom: 8px;
        }

        .input-ios {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 15px 16px;
            font-size: 1rem;
            color: #FFFFFF;
            outline: none;
            transition: all 0.25s ease;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .input-ios::placeholder {
            color: #64748B;
        }

        .input-ios:focus {
            border-color: #D4AF37;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.2);
        }

        select.input-ios option {
            background-color: #121826;
            color: #FFFFFF;
            padding: 12px;
        }

        .row-grid {
            display: flex;
            gap: 14px;
            margin-bottom: 22px;
        }

        .col {
            flex: 1;
        }

        /* Seletor com a palavra PESSOAS */
        .pax-grid {
            display: flex;
            gap: 8px;
        }

        .pax-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 13px 0;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: #CBD5E1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .pax-btn.active {
            background: linear-gradient(135deg, #E6CA65 0%, #D4AF37 100%);
            color: #0B0F17;
            border-color: #D4AF37;
            font-weight: 700;
            box-shadow: 0 6px 16px rgba(212, 175, 55, 0.35);
        }

        .btn-reserve {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #E6CA65 0%, #D4AF37 100%);
            color: #0B0F17;
            text-align: center;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            border: none;
            box-shadow: 0 12px 30px rgba(212, 175, 55, 0.3);
            margin-top: 28px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-reserve:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 35px rgba(212, 175, 55, 0.45);
            filter: brightness(1.08);
        }

        .secure-footer {
            text-align: center;
            font-size: 0.78rem;
            color: #94A3B8;
            margin-top: 20px;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Tela Inicial: Máquina de Escrever Cinematográfica -->
    <div id="intro-screen" onclick="revelarCartaReserva()">
        <div class="typewriter-container">
            <span class="typewriter-text" id="typewriter"></span>
        </div>
        <div class="intro-hint" id="intro-hint" style="display: none;">[ Clique em qualquer lugar para acessar ]</div>
    </div>

    <!-- Carta de Reserva Principal -->
    <div class="page-container" id="main-content">
        <div class="glass-container">
            
            <div class="hero-banner">
                <div class="concierge-badge">✨ Concierge Privé</div>
                <h1 class="restaurant-title">Restaurante X</h1>
                <div class="restaurant-subtitle">Alta Gastronomia • Experiência Exclusiva</div>
            </div>

            <div class="form-content">
                <form id="reservaForm" onsubmit="enviarWhatsApp(event)">
                    <div class="form-group">
                        <label for="nome">Nome Completo do Titular</label>
                        <input type="text" id="nome" class="input-ios" placeholder="Ex: Dr. Roberto Sampaio" required>
                    </div>

                    <div class="row-grid">
                        <div class="col">
                            <label for="data">Data Desejada</label>
                            <input type="date" id="data" class="input-ios" required>
                        </div>
                        <div class="col">
                            <label for="horario">Horário</label>
                            <select id="horario" class="input-ios" required>
                                <option value="" disabled selected>Selecione</option>
                                <option value="20:00 - 1º Turno Exclusivo">20:00 - 1º Turno</option>
                                <option value="21:15 - Turno Nobre">21:15 - Turno Nobre</option>
                                <option value="22:30 - Late Night Privé">22:30 - Late Night</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Número de Pessoas</label>
                        <div class="pax-grid" id="paxContainer">
                            <div class="pax-btn" data-value="2 Pessoas">2 Pessoas</div>
                            <div class="pax-btn active" data-value="4 Pessoas">4 Pessoas</div>
                            <div class="pax-btn" data-value="6 Pessoas">6 Pessoas</div>
                            <div class="pax-btn" data-value="8+ Pessoas VIP">8+ Pessoas</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="obs">Ocasião Especial ou Restrições</label>
                        <input type="text" id="obs" class="input-ios" placeholder="Ex: Aniversário, restrição alimentar...">
                    </div>

                    <button type="submit" class="btn-reserve">
                        Garantir Reserva Exclusiva • WhatsApp
                    </button>
                </form>

                <div class="secure-footer">
                    Serviço de Concierge &bull; Atendimento Privativo e Imediato
                </div>
            </div>

        </div>
    </div>

    <script>
        // Efeito Máquina de Escrever
        const textoIntro = "Sua primeira vez no restaurante X?\nFaça sua reserva.";
        let i = 0;
        const speed = 65; // Velocidade da digitação em ms
        const typewriterElement = document.getElementById('typewriter');
        const introScreen = document.getElementById('intro-screen');
        const mainContent = document.getElementById('main-content');
        const introHint = document.getElementById('intro-hint');

        function typeWriter() {
            if (i < textoIntro.length) {
                typewriterElement.innerHTML += textoIntro.charAt(i) === '\n' ? '<br>' : textoIntro.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            } else {
                // Exibe a dica de clique após terminar de digitar
                introHint.style.display = 'block';
            }
        }

        // Inicia a digitação após a página carregar
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(typeWriter, 500);
        });

        // Revelar a carta de reserva ao clicar na tela preta
        function revelarCartaReserva() {
            introScreen.classList.add('fade-out');
            mainContent.classList.add('show');
            setTimeout(() => {
                introScreen.style.display = 'none';
            }, 800);
        }

        // Seleção interativa dos botões de Pessoas
        let pessoasSelecionadas = "4 Pessoas";
        const paxBtns = document.querySelectorAll('.pax-btn');
        
        paxBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                paxBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                pessoasSelecionadas = btn.getAttribute('data-value');
            });
        });

        // Envio estruturado para o WhatsApp
        function enviarWhatsApp(event) {
            event.preventDefault();

            const nome = document.getElementById('nome').value;
            const dataInput = document.getElementById('data').value;
            const horario = document.getElementById('horario').value;
            const obs = document.getElementById('obs').value || 'Nenhuma restrição adicional';

            let dataFormatada = dataInput;
            if (dataInput) {
                const partes = dataInput.split('-');
                if (partes.length === 3) {
                    dataFormatada = `${partes[2]}/${partes[1]}/${partes[0]}`;
                }
            }

            const numeroWhatsApp = "5517999999999";

            const textoMensagem = 
                `✨ *SOLICITAÇÃO DE RESERVA EXCLUSIVA*\n` +
                `*Restaurante X - Serviço de Concierge*\n\n` +
                `*Titular:* ${nome}\n` +
                `*Data da Experiência:* ${dataFormatada}\n` +
                `*Horário:* ${horario}\n` +
                `*Pessoas:* ${pessoasSelecionadas}\n` +
                `*Ocasião / Notas:* ${obs}\n\n` +
                `_Gostaria de validar a disponibilidade da mesa e concluir os detalhes da minha reserva._`;

            const url = `https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(textoMensagem)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
